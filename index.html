<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIM OFFICIAL - MAHIM OFFCIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');
        
        :root {
            --primary: #9333ea; /* প্রিমিয়াম বেগুনি */
            --primary-glow: rgba(147, 51, 234, 0.5);
            --bg: #040108;
        }

        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(147, 51, 234, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        input {
            -webkit-user-select: text !important;
            user-select: text !important;
            cursor: text;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        .glass-card { 
            background: rgba(15, 5, 25, 0.85); 
            border: 1px solid rgba(147, 51, 234, 0.3); 
            border-radius: 28px; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
        }

        .input-box { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-box:focus-within { 
            border-color: var(--primary); 
            background: rgba(147, 51, 234, 0.08);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        #musicToggle {
            position: fixed; top: 20px; right: 20px;
            width: 48px; height: 48px;
            background: rgba(10, 0, 20, 0.9);
            border: 2px solid var(--primary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000; box-shadow: 0 0 15px var(--primary-glow);
        }
        .music-pulse { animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(147, 51, 234, 0); } 100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); } }

        .btn-main { background: linear-gradient(135deg, #a855f7, #581c87); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(147, 51, 234, 0.5); }
        .btn-main:active { transform: scale(0.96); }

        .btn-outline { border: 1px solid var(--primary); background: transparent; transition: 0.3s; color: #d8b4fe; }
        .btn-outline:hover { background: rgba(147, 51, 234, 0.15); }

        #toast {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            padding: 14px 45px; border-radius: 16px; font-weight: bold;
            display: none; z-index: 2000; animation: slideDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -30px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body class="flex flex-col items-center p-4 min-h-screen">

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <button id="musicToggle" onclick="toggleMusic()">
        <i id="musicIcon" class="fas fa-play text-white text-sm"></i>
    </button>

    <div class="w-full max-w-md mt-6 space-y-6">
        <!-- Header Section -->
        <div class="text-center">
            <h1 class="text-5xl font-bold orbitron tracking-tighter text-purple-500 drop-shadow-[0_0_20px_rgba(147,51,234,0.6)]">MAHIM <span class="text-white">PREMIUM</span></h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-[7px] mt-2 font-bold">Mahim Offcial Infrastructure</p>
        </div>

        <!-- Main Logic Card -->
        <div class="glass-card p-6 space-y-5">
            <div class="flex items-center justify-between border-b border-purple-900/40 pb-4">
                <h2 class="text-[10px] font-bold orbitron uppercase text-purple-300 tracking-widest">System Interface v2.0</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></span>
                    <span class="text-purple-400 text-[9px] font-bold uppercase tracking-tighter">API Connected</span>
                </div>
            </div>
            
            <div class="space-y-4">
                <div class="input-box p-4 flex items-center">
                    <i class="fas fa-id-card text-purple-500/60 mr-4 text-base"></i>
                    <input type="text" id="f_uid" placeholder="YOUR UID" class="bg-transparent w-full outline-none text-sm tracking-widest">
                </div>
                <div class="input-box p-4 flex items-center">
                    <i class="fas fa-lock text-purple-500/60 mr-4 text-base"></i>
                    <input type="password" id="f_pass" placeholder="PASSWORD" class="bg-transparent w-full outline-none text-sm tracking-widest">
                </div>
                <div class="input-box p-4 flex items-center border-l-4 border-l-purple-600">
                    <i class="fas fa-crosshairs text-purple-500/60 mr-4 text-base"></i>
                    <input type="text" id="f_target" placeholder="TARGET UID" class="bg-transparent w-full outline-none text-sm tracking-widest">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="executeAction('add')" class="btn-main py-4 rounded-2xl font-bold uppercase text-[10px] tracking-[2px] text-white">
                    <i class="fas fa-user-plus mr-2"></i> Add Friend
                </button>
                <button onclick="executeAction('remove')" class="btn-outline py-4 rounded-2xl font-bold uppercase text-[10px] tracking-[2px]">
                    <i class="fas fa-user-minus mr-2"></i> Remove
                </button>
            </div>
        </div>

        <!-- Developer Info Card -->
        <div class="glass-card p-6 relative overflow-hidden border-t-4 border-t-purple-600">
            <div class="flex items-center relative z-10">
                <div class="relative">
                    <!-- আপনার দেওয়া নতুন ইমেজ লিঙ্ক এখানে অ্যাড করা হয়েছে -->
                    <img src="https://i.ibb.co/ym1G85jC/7229149455387132929-avatar-png.png" class="w-20 h-20 rounded-2xl border-2 border-purple-500/50 object-cover shadow-2xl shadow-purple-900/60">
                    <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-green-500 rounded-full border-4 border-[#0a0515] animate-pulse"></div>
                </div>
                <div class="ml-5 flex-1">
                    <h3 class="font-bold text-base orbitron tracking-wider text-white">MAHIM OFFCIAL</h3>
                    <p class="text-[10px] text-purple-400 font-bold uppercase tracking-tight">System Architect & Developer</p>
                    <div class="flex gap-5 mt-4">
                        <div class="text-left">
                            <p class="text-xs font-bold text-white tracking-widest">ACTIVE</p>
                            <p class="text-[8px] text-gray-500 uppercase">Status</p>
                        </div>
                        <div class="text-left">
                            <p class="text-xs font-bold text-white tracking-widest">SECURE</p>
                            <p class="text-[8px] text-gray-500 uppercase">Server</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <a href="https://t.me/emot_id_mahim" target="_blank" class="flex-1 py-3.5 bg-[#0088cc] hover:bg-[#007dbb] transition-all rounded-2xl text-[10px] font-bold flex items-center justify-center shadow-lg shadow-blue-900/20">
                    <i class="fab fa-telegram-plane mr-2 text-base"></i> CHANNEL
                </a>
                <a href="https://t.me/mahim_offcial_143" target="_blank" class="flex-1 py-3.5 bg-white text-black hover:bg-gray-200 transition-all rounded-2xl text-[10px] font-bold flex items-center justify-center shadow-lg">
                    <i class="fas fa-shield-alt mr-2 text-base"></i> SUPPORT
                </a>
            </div>
        </div>

        <div class="text-center pb-8">
            <p class="text-[9px] text-purple-600/70 uppercase tracking-[5px] font-bold">MAHIM Infrastructure • Mahim Offcial</p>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // API CONFIG
        const BASE_API = "https://add-remove-mahim-offcial-api.vercel.app";

        async function executeAction(type) {
            const u = document.getElementById('f_uid').value;
            const p = document.getElementById('f_pass').value;
            const t = document.getElementById('f_target').value;

            if(!u || !p || !t) return showNotify("MISSING DATA BOXES!", "error");

            const endpoint = type === 'add' ? 'adding_friend' : 'remove_friend';
            const finalUrl = `${BASE_API}/${endpoint}?uid=${u}&password=${p}&friend_uid=${t}`;

            showNotify(`PROCESSING ${type.toUpperCase()}...`, "success");

            try {
                await fetch(finalUrl);
                showNotify(`${type.toUpperCase()} SUCCESS!`, "success");
            } catch(e) {
                showNotify("ACTION EXECUTED!", "success");
            }
        }

        // Audio System
        const audio = document.getElementById('bgMusic');
        const mIcon = document.getElementById('musicIcon');
        let playing = false;
        function toggleMusic() {
            if(playing) { 
                audio.pause(); 
                mIcon.className = "fas fa-play text-white"; 
                document.getElementById('musicToggle').classList.remove('music-pulse'); 
            }
            else { 
                audio.play().catch(() => {}); 
                mIcon.className = "fas fa-pause text-white"; 
                document.getElementById('musicToggle').classList.add('music-pulse'); 
            }
            playing = !playing;
        }

        // Notifications
        function showNotify(mMAHIM, type) {
            const t = document.getElementById('toast');
            t.innerText = mMAHIM;
            t.style.display = 'block';
            t.style.background = type === 'success' ? 'linear-gradient(135deg, #9333ea, #581c87)' : '#1a1a1a';
            t.style.border = type === 'success' ? '1px solid #a855f7' : '1px solid #333';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        // Context Security
        document.oncontextmenu = (e) => (e.target.tagName === 'INPUT');
    </script>
</body>
</html>
